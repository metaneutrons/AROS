# Mesa 26 integration for AROS AArch64
#
# This replaces the old Mesa 20.0.8 in-tree build with a submodule-based
# approach. Mesa is built separately via Meson and the resulting static
# libraries are linked into AROS HIDDs and mesa3dgl.library.
#
# Usage:
#   1. git submodule update --init external/mesa
#   2. cd workbench/libs/mesa26 && bash build.sh
#   3. Normal AROS build picks up libs from workbench/libs/mesa26/lib/
#
# Libraries produced:
#   libmesa_util.a          — Mesa utility functions
#   libcompiler.a           — NIR/GLSL shader compiler
#   libgallium.a            — Gallium state tracker + auxiliary
#   libv3d.a                — V3D Gallium driver (RPi4 V3D 4.2 + RPi5 V3D 7.1)
#   libbroadcom.a           — Broadcom V3D shader compiler (QPU)
#   libsoftpipe.a           — Software renderer fallback
#   libaros_mesa_compat.a   — POSIX/DRM stubs for AROS

MESA26_LIBDIR = $(SRCDIR)/workbench/libs/mesa26/lib

MESA26_LIBS = \
    -L$(MESA26_LIBDIR) \
    -Wl,--start-group \
    -lv3d -lbroadcom -lcompiler -lgallium -lmesa_util -lsoftpipe \
    -laros_mesa_compat \
    -Wl,--end-group \
    -lm
